<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3"></script>
</head>

<body class="bg-linear-to-t from-slate-100 to-neutral-100 min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="space-y-3 pb-3">

    <!-- Top bar -->
    <div class="bg-white/60 backdrop-blur shadow-sm p-3">
      <i class="fa-regular fa-calendar text-blue-500"></i>
      <span class="text-md font-bold text-blue-600 ml-2">Today's Schedule</span>
    </div>

    <!-- Date + Add -->
    <div class="flex items-center justify-between px-3 md:px-5  mt-5 ">

      <div class="text-start">
        <span id="weekDay" class="font-black text-4xl lg:text-5xl">Friday</span>
        <div class="text-3xl md:text-5xl font-bold text-gray-700">
          <span id="day">10</span>,
          <span id="month">Apr</span>
        </div>
      </div>

      <!-- Add Button -->
      <div title="Add Task" class="addBtn cursor-pointer shadow-lg hover:scale-105 transition duration-200
      p-3 rounded-xl bg-gradient-to-br from-sky-400 via-blue-400 to-blue-600 text-white">
        <i class="fa-solid fa-plus text-2xl"></i>
      </div>

    </div>

    <!-- Input Box -->
    <div class="inputTaskBox hidden space-y-3 px-3 mt-4 md:mt-5 lg:mt-6 ">

      <div class="flex items-center gap-3 md:gap-4 lg:gap-5">
        <input type="text" placeholder="What's the next big thing" autofocus class="inputTask w-full h-14 md:h-15 lg:h-16 rounded-full px-4 bg-white shadow-md border border-gray-200 
          focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />

        <select id="task-category" class="bg-gray-200 px-3 py-2 rounded-full">
          <option value="task">Task</option>
          <option value="gym">Gym</option>
          <option value="study">Study</option>
          <option value="call">Call</option>
        </select>
      </div>

      <button
        class="taskAddBtn w-full rounded-lg py-2 md:py-3 lg:py-4 bg-blue-500 text-white hover:bg-blue-600 transition">
        Add Task
      </button>
    </div>

  </header>

  <!-- MAIN -->
  <main class="flex-1 p-3 flex flex-col lg:flex-row gap-4">


    <section class="hidden lg:flex w-full lg:w-1/2  rounded-xl p-4">
      <p class="text-gray-400">Total task : <span id="totalTask">0</span></p>
    </section>


    <section class="w-full lg:w-1/2">

      <!-- Filters -->
      <div id="filterSection" class="flex flex-wrap gap-2 mb-4">

        <button class="filterBtn px-4 py-1.5 rounded-full border text-sm  hover:bg-blue-500 hover:text-white transition"
          data-filter="all">All</button>

        <button class="filterBtn px-4 py-1.5 rounded-full border text-sm  hover:bg-blue-500 hover:text-white transition"
          data-filter="task">Task</button>

        <button class="filterBtn px-4 py-1.5 rounded-full border text-sm  hover:bg-blue-500 hover:text-white transition"
          data-filter="gym">Gym</button>

        <button class="filterBtn px-4 py-1.5 rounded-full border text-sm  hover:bg-blue-500 hover:text-white transition"
          data-filter="study">Study</button>

        <button class="filterBtn px-4 py-1.5 rounded-full border text-sm  hover:bg-blue-500 hover:text-white transition"
          data-filter="call">Call</button>

      </div>

      <!-- Task Container -->
      <div class="min-h-[65vh]">
        <ul class="taskCant space-y-4">

          <!-- Empty State -->
          <div class="flex flex-col items-center justify-center text-center text-gray-400 mt-20 space-y-10">
            <i class="fa-regular fa-circle-check text-5xl mb-3 text-blue-400"></i>
            <p class="text-lg font-semibold">No tasks yet</p>
            <p class="text-sm">Add your first task </p>
          </div>

        </ul>
      </div>

    </section>




  </main>

  <!-- FOOTER -->
  <footer class="py-4 text-center text-md md:text-lg lg:text-xl text-white border-t bg-black/70 backdrop-blur">

    <p>TrackIt • Built to manage task</p>

    <div class="flex justify-center gap-4 mt-2 ">

      <!-- Git Hub -->
      <a href="https://github.com/DeepakChauhan33" target="_blank">
        <i class="fa-brands fa-github hover:text-black text-xl md:text-2xl cursor-pointer"></i>
      </a>

      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/in/dpk-chauhan/" target="_blank">
        <i class="fa-brands fa-linkedin hover:text-blue-600 text-xl md:text-2xl cursor-pointer"></i>
      </a>

      <!-- Gmail -->
      <a href="mailto:deep651965@://gmail.com" target="_blank">
        <i class="fa-solid fa-envelope hover:text-red-500 text-xl md:text-2xl cursor-pointer"></i>
      </a>



    </div>

  </footer>

  <script src="script.js"></script>
</body>

</html>
